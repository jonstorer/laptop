name: ShellCheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: ShellCheck
        run: shellcheck ubuntu-openclaw ubuntu pi mac-agentic mac-openclaw mac-x86_64
